# Tool Configuration
# Configure HOW the tool runs
# 
# These settings control the mechanics of running queries and storing results.
# Users shouldn't need to change these unless tuning performance.

# Model Configuration
# Define which LLMs to query. Each enabled model runs all prompts independently.
models:
  # Primary LLM for generating responses
  - provider: "ollama"
    model: "gemma4:e2b"
    endpoint: "http://localhost:11434"
    enabled: true
    temperature: 0.7
  
  # Alternative models for comparison testing
  - provider: "ollama"
    model: "nemotron-3-nano:4b"
    endpoint: "http://localhost:11434"
    enabled: false
    temperature: 0.7
  
  - provider: "ollama"
    model: "qwen3.5:122b"
    endpoint: "http://localhost:11434"
    enabled: false
    temperature: 0.7

# Tracking Parameters
tracking:
  # Queries per prompt (affects statistical significance)
  # Higher = more reliable data but takes longer
  #   10 queries  → ~±30% confidence interval
  #   30 queries  → ~±17% confidence interval
  #   100 queries → ~±10% confidence interval
  queries_per_prompt: 10
  
  # Retry settings for failed queries
  max_retries: 3
  
  # Data retention
  max_history_days: 90
  
  # Phase 2: Statistical Analysis Configuration
  statistical_analysis:
    enabled: true
    confidence_level: 95  # 90, 95, or 99
    track_run_history: true
    min_runs_for_significance: 5
    anomaly_threshold: 2.0  # Standard deviations to flag as anomaly
  
  # Phase 3: Query Fan-Out with Prompt Variations
  prompt_variations:
    enabled: false  # Set to true to enable
    num_variations: 3  # Generate 3 variations per base prompt
    strategy: "semantic"  # "semantic", "synonym", or "full"
  
  # Phase 4: Auto Prompt Generation
  auto_prompt_generation:
    enabled: false  # Set to true to enable
    per_brand_prompts: 15
    categories:
      - comparison
      - recommendation
      - trends
      - expertise
      - purchase_intent

# Mention Detection Settings
detection:
  # Method: "keyword" | "llm" | "both"
  method: "both"
  
  # LLM-based detection config (used when method is "llm" or "both")
  llm:
    model: "gemma4:e2b"
    temperature: 0.1

# Output Configuration
output:
  database_path: "data/tracks.db"
  export_formats: ["csv", "json"]
  logs_dir: "logs"

# Database Settings
database:
  # Auto-cleanup threshold
  cleanup_threshold_days: 90

# Default prompts (user can override in users/prompts.yaml)
prompts:
  brand_mentions:
    - "What are the best athletic footwear brands for running in 2026?"
    - "Compare Nike vs Adidas for basketball shoes"
  
  topic_authority:
    - "What is the future of sustainable athletic footwear?"
