# Tool Configuration
# Configure HOW the tool runs
# 
# These settings control the mechanics of running queries and storing results.
# Users shouldn't need to change these unless tuning performance.

# Analysis LLM — separate from test models
# Used for mention detection (LLM mode), sentiment analysis, and other analysis tasks.
# Defaults to a free local model to keep costs at zero.
analysis:
  provider: "ollama"
  model: "gemma4:e2b"
  temperature: 0.1

# Model Configuration
# Define which LLMs to query. Each enabled model runs all prompts independently.
# These are the models being TESTED — separate from the analysis model above.
models:
  # Primary LLM for generating responses
  - provider: "ollama"
    model: "gemma4:e2b"
    endpoint: "http://localhost:11434"
    enabled: true
    temperature: 0.7
  
  # Alternative models for comparison testing
  - provider: "ollama"
    model: "nemotron-3-nano:4b"
    endpoint: "http://localhost:11434"
    enabled: false
    temperature: 0.7
  
  - provider: "ollama"
    model: "qwen3.5:122b"
    endpoint: "http://localhost:11434"
    enabled: false
    temperature: 0.7

# Tracking Parameters
tracking:
  # Queries per prompt (affects statistical significance)
  # Higher = more reliable data but takes longer
  #   10 queries  → ~±30% confidence interval
  #   30 queries  → ~±17% confidence interval
  #   100 queries → ~±10% confidence interval
  queries_per_prompt: 10
  
  # Retry settings for failed queries
  max_retries: 3
  
  # Data retention
  max_history_days: 90
  
  # Adaptive sampling: automatically stop querying when confidence interval is narrow enough
  # Defaults favour speed over accuracy — tune these for your precision requirements.
  # Note: reaching tight CI widths (<10%) at moderate mention rates (~50%) may require
  # 300+ queries. Consider raising max_queries if you need higher precision.
  adaptive_sampling:
    enabled: true                   # Enable adaptive stopping (set false for fixed query counts)
    target_ci_width: 20.0           # Stop when 95% CI width < 20% (±10% precision)
    max_queries: 200                # Hard ceiling per model×prompt pair
    check_interval: 5               # Evaluate convergence every N queries
    convergence_scope: "primary_brand"  # "primary_brand" or "all_tracked_brands"
  
  # Phase 2: Statistical Analysis Configuration
  statistical_analysis:
    enabled: true
    confidence_level: 95  # 90, 95, or 99
    track_run_history: true
    min_runs_for_significance: 5
    anomaly_threshold: 2.0  # Standard deviations to flag as anomaly
  
  # Phase 3: Query Fan-Out with Prompt Variations
  prompt_variations:
    enabled: false  # Set to true to enable
    num_variations: 3  # Generate 3 variations per base prompt
    strategy: "semantic"  # "semantic", "synonym", or "full"
  
  # Phase 4: Auto Prompt Generation
  auto_prompt_generation:
    enabled: false  # Set to true to enable
    per_brand_prompts: 15
    categories:
      - comparison
      - recommendation
      - trends
      - expertise
      - purchase_intent

# Mention Detection Settings
detection:
  # Method: "keyword" | "llm" | "both"
  method: "both"
  
  # LLM-based detection config (used when method is "llm" or "both")
  llm:
    model: "gemma4:e2b"
    temperature: 0.1

# Sentiment Configuration
# Controls how brand mention sentiment is analyzed.
sentiment:
  mode: "fast"              # "fast" (post-batch, 1 call per brand) or "detailed" (inline per-query)

# Output Configuration
output:
  database_path: "data/tracks.db"
  export_formats: ["csv", "json"]
  logs_dir: "logs"

# Database Settings
database:
  # Auto-cleanup threshold
  cleanup_threshold_days: 90

# Default prompts (user can override in users/prompts.yaml)
prompts:
  brand_mentions:
    - "What are the best athletic footwear brands for running in 2026?"
    - "Compare Nike vs Adidas for basketball shoes"
  
  topic_authority:
    - "What is the future of sustainable athletic footwear?"
