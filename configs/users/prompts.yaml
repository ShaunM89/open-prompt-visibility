  - "What are the best athletic footwear brands for running in 2026?"
  - "Compare Nike vs Adidas for basketball shoes"
  - "Name the top 5 athletic apparel companies in 2024"
  - "Which brand has better running shoes, Nike or Adidas?"
  
  # Industry topic queries
  - "Which sportswear brands offer the best sustainability initiatives?"
  - "What footwear brands are best for marathon training?"
  - "Best athletic wear for gym workouts"
  - "Top sportswear brands 2026"

topic_authority:
